<body>

<div class="container py-4">
    <h2 class="text-center mb-2 text-primary fw-bold">MBA Short Questions Practice</h2>
    <div class="text-center mb-4">

                <button id="start-wrong-exam-btn" class="btn btn-sm btn-danger">ভুল উত্তরগুলোর পরীক্ষা</button>
            </div>
        </div>
        
        <div id="question-list"></div>
    </div>

        <div id="exam-question-list"></div>

            <button id="finish-set-btn" class="btn btn-success px-4 py-2 fw-bold">সেট শেষ করুন ও স্কোর দেখুন</button>
        </div>
        
        <div id="score-board" style="display:none;" class="alert alert-info text-center">

        </div>
    </div>

    // Local Storage State

        $('#total-q-count').text(qaData.length);

        });

        $('#start-exam-btn').click(() => setupExam(qaData));
        
        $('#start-wrong-exam-btn').click(() => {
            if(wrongQuestions.length === 0) {
                alert("আপনার পুলে কোনো ভুল উত্তর নেই! দারুণ!");
                return;

            let wrongData = qaData.filter(q => wrongQuestions.includes(q.id));
            setupExam(wrongData);
        });

        $('#end-exam-btn, #back-to-study-btn').click(endExam);

            currentSetIndex++;
            renderExamSet();
        });
    });

    function updateWrongCounter() {
        $('#wrong-q-count').text(wrongQuestions.length);
    }

    // AI Simplification API Call
    async function getAIAnswer(id, originalText) {
        if(aiAnswers[id]) {
            toggleAIText(id);
            return;
        }

        let apiKey = localStorage.getItem('GEMINI_API_KEY');
        if(!apiKey) {
            apiKey = prompt("🤖 AI ব্যবহার করতে আপনার বিনামূল্যে পাওয়া Gemini API Key দিন:\n(এটি আপনার ব্রাউজারে সেভ থাকবে)");
            if(!apiKey) return;
            localStorage.setItem('GEMINI_API_KEY', apiKey);
        }

        $(`#ai-btn-${id}`).text("অপেক্ষা করুন...");

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Simplify this short answer in very easy Bengali. Keep it brief and accurate. Original text: "${originalText}"` }] }]
                })
            });
            const data = await response.json();
            
            if(data.error) throw new Error(data.error.message);
            
            const simplifiedText = data.candidates[0].content.parts[0].text;
            aiAnswers[id] = simplifiedText;
            localStorage.setItem('aiAnswers', JSON.stringify(aiAnswers));
            
            $(`#ai-ans-${id}`).html(`<strong>সহজ উত্তর (AI):</strong> ${simplifiedText}`);
            toggleAIText(id);
        } catch(e) {
            alert("AI Error: " + e.message + "\nআপনার API Key ঠিক আছে কিনা চেক করুন।");
            localStorage.removeItem('GEMINI_API_KEY'); // delete invalid key
        } finally {
            $(`#ai-btn-${id}`).html("🤖 AI সহজ উত্তর");
        }
    }

    function toggleAIText(id) {
        let aiBox = $(`#ai-ans-${id}`);
        let origBox = $(`#ans-${id}`);
        
        if(aiBox.is(':visible')) {
            aiBox.hide();
            origBox.show();
            $(`#ai-btn-${id}`).html("🤖 AI সহজ উত্তর");
        } else {
            origBox.hide();
            aiBox.html(`<strong>সহজ উত্তর (AI):</strong> ${aiAnswers[id]}`).show();
            $(`#ai-btn-${id}`).html("📖 মূল উত্তর দেখুন (Undo)");
        }
    }

    function renderStudyMode() {
        let html = '';
        qaData.forEach(item => {
            let isTicked = tickedQuestions.includes(item.id);
            let aiBtnText = aiAnswers[item.id] ? "🤖 AI সহজ উত্তর" : "🤖 AI দিয়ে সহজ করুন";
            
            html += `
            <div class="card ${isTicked ? 'ticked' : ''}" id="card-${item.id}">
                <div class="card-body">
                    <div class="card-title"><span class="badge bg-info text-dark">${item.year}</span> ${item.q}</div>
                    
                    <div class="answer-box" id="ans-${item.id}"><strong>বইয়ের উত্তর:</strong> ${item.a}</div>
                    <div class="ai-text" id="ai-ans-${item.id}"></div>

                    <div class="action-bar">
                        <button class="btn btn-sm btn-outline-primary" onclick="$('#ans-${item.id}').slideToggle(); $('#ai-ans-${item.id}').hide();">Show/Hide</button>
                        <button class="btn btn-sm btn-outline-info ai-btn" id="ai-btn-${item.id}" onclick="getAIAnswer(${item.id}, '${item.a}')">${aiBtnText}</button>
                        <button class="btn btn-sm ${isTicked ? 'btn-secondary' : 'btn-success'} tick-btn-${item.id} ms-auto" onclick="toggleTick(${item.id})">${isTicked ? 'Untick ❌' : 'Tick ✔️'}</button>
                    </div>
                </div>
            </div>`;
        });
        $('#question-list').html(html);
    }

    function toggleTick(id) {
        if (tickedQuestions.includes(id)) {
            tickedQuestions = tickedQuestions.filter(qId => qId !== id); 
        } else {
            tickedQuestions.push(id); 
        }
        localStorage.setItem('tickedQs', JSON.stringify(tickedQuestions));
        
        // Update UI dynamically without full re-render
        let isTicked = tickedQuestions.includes(id);
        $(`#card-${id}, #exam-card-${id}`).toggleClass('ticked', isTicked);
        $(`.tick-btn-${id}`).text(isTicked ? 'Untick ❌' : 'Tick ✔️')
                            .toggleClass('btn-success btn-secondary');
    }

    // --- Exam Logic ---
    function setupExam(dataSource) {
        let numStr = prompt(`আপনার কাছে মোট ${dataSource.length} টি প্রশ্ন আছে। আপনি প্রতিটি সেটে কয়টি করে প্রশ্ন রাখতে চান? (যেমন: ১০)`);
        let numPerSet = parseInt(numStr);
        
        if (isNaN(numPerSet) || numPerSet <= 0) {
            alert("সঠিক সংখ্যা দিন!"); return;
        }

        // Shuffle Data
        let shuffled = [...dataSource].sort(() => 0.5 - Math.random());
        
        // Chunk into Sets
        examSets = [];
        for (let i = 0; i < shuffled.length; i += numPerSet) {
            examSets.push(shuffled.slice(i, i + numPerSet));
        }

        currentSetIndex = 0;
        $('#study-mode').hide();
        $('#exam-mode').fadeIn();
        renderExamSet();
    }

    function renderExamSet() {
        $('#score-board').hide();
        $('#exam-controls').show();
        
        if (currentSetIndex >= examSets.length) {
            endExam();
            alert("সবগুলো সেট শেষ হয়েছে!");
            return;
        }

        currentSetQuestions = examSets[currentSetIndex];
        $('#exam-set-info').text(`Set ${currentSetIndex + 1} / ${examSets.length}`);

        let html = '';
        currentSetQuestions.forEach((item, index) => {
            let isTicked = tickedQuestions.includes(item.id);
            
            html += `
            <div class="card mb-3" id="exam-card-${item.id}">
                <div class="card-body">
                    <div class="card-title">প্রশ্ন ${index + 1}: ${item.q}</div>
                    <textarea class="form-control exam-user-answer mb-2" rows="2" placeholder="আপনার উত্তর..."></textarea>
                    
                    <div class="answer-box" id="exam-ans-${item.id}"><strong>সঠিক উত্তর:</strong> ${item.a}</div>
                    <div class="ai-text" id="exam-ai-ans-${item.id}">${aiAnswers[item.id] ? '<strong>AI উত্তর:</strong> ' + aiAnswers[item.id] : ''}</div>

                    <div class="action-bar mt-2">
                        <button class="btn btn-sm btn-primary" onclick="$('#exam-ans-${item.id}').slideToggle(); $('#exam-ai-ans-${item.id}').hide();">উত্তর মেলান</button>
                        ${aiAnswers[item.id] ? `<button class="btn btn-sm btn-info" onclick="$('#exam-ans-${item.id}').hide(); $('#exam-ai-ans-${item.id}').slideToggle();">AI উত্তর দেখুন</button>` : ''}
                        <button class="btn btn-sm ${isTicked ? 'btn-secondary' : 'btn-success'} tick-btn-${item.id} ms-auto" onclick="toggleTick(${item.id})">${isTicked ? 'সঠিক (Untick ❌)' : 'সঠিক হয়েছে (Tick ✔️)'}</button>
                    </div>
                </div>
            </div>`;
        });

        $('#exam-question-list').html(html);
        window.scrollTo(0, 0);
    }

    function finishExamSet() {
        let correctCount = 0;
        
        currentSetQuestions.forEach(q => {
            if (tickedQuestions.includes(q.id)) {
                correctCount++;
                // Remove from wrong pool if it was there
                wrongQuestions = wrongQuestions.filter(id => id !== q.id);
            } else {
                // Add to wrong pool if not ticked
                if(!wrongQuestions.includes(q.id)) wrongQuestions.push(q.id);
            }
        });

        localStorage.setItem('wrongQs', JSON.stringify(wrongQuestions));
        updateWrongCounter();

        $('#exam-question-list .answer-box').slideDown(); // Show all answers to review
        $('#exam-controls').hide();
        
        $('#current-score').text(correctCount);
        $('#set-total').text(currentSetQuestions.length);
        
        if(currentSetIndex === examSets.length - 1) {
            $('#next-set-btn').hide();
        } else {
            $('#next-set-btn').show();
        }
        
        $('#score-board').fadeIn();
        window.scrollTo(0, document.body.scrollHeight);
    }

    function endExam() {
        $('#exam-mode').hide();
        $('#study-mode').fadeIn();
        $('.answer-box').hide(); 
        allAnswersVisible = false;
        $('#toggle-all-answers').text('সব উত্তর দেখুন').removeClass('btn-outline-warning').addClass('btn-warning');
        renderStudyMode(); 
        window.scrollTo(0, 0);
    }
</script>
